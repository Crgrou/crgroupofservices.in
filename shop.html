<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Shop - CR Group of Services</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="shop.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.svg" alt="CR Group Logo">
        <h2>CR Group of Services</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#contact">Contact</a>
        <a href="#" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<section class="shop-hero">
    <h1>CR Group Online Shop</h1>
    <p>Quality products delivered to your doorstep</p>
    
    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search products..." class="search-box">
        <select id="categoryFilter" class="category-select">
            <option value="">All Categories</option>
            <option value="Documents">Government Documents</option>
            <option value="Travel">Travel & Tickets</option>
            <option value="Insurance">Insurance Services</option>
            <option value="Utilities">Utilities & Recharge</option>
        </select>
    </div>
</section>

<section class="shop-container">
    <div class="products-grid" id="productsGrid">
        <!-- Products will be loaded here by JavaScript -->
    </div>
</section>

<!-- Shopping Cart Modal -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Shopping Cart</h2>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be displayed here -->
        </div>
        <div class="cart-summary">
            <p class="cart-total">Total: ₹<span id="cartTotal">0</span></p>
            <button class="btn btn-primary" id="checkoutBtn">Proceed to Checkout</button>
        </div>
    </div>
</div>

<footer>
    © 2026 CR Group of Services - Online Shop
</footer>

<script src="shop.js"></script>

</body>
</html>
