<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Shop - CR Group of Services</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="shop.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.svg" alt="CR Group Logo">
        <h2>CR Group of Services</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#contact">Contact</a>
        <a href="#" class="cart-link" id="cartLink">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<section class="shop-hero">
    <h1>🛍️ CR Group Online Shop</h1>
    <p>Quality services delivered to your doorstep</p>
    
    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="🔍 Search products..." class="search-box">
        <select id="categoryFilter" class="category-select">
            <option value="">📂 All Categories</option>
            <option value="Documents">📋 Government Documents</option>
            <option value="Travel">✈️ Travel & Tickets</option>
            <option value="Insurance">🏥 Insurance Services</option>
            <option value="Utilities">💡 Utilities & Recharge</option>
        </select>
        <button class="filter-reset-btn" id="resetFilters">Reset</button>
    </div>
</section>

<section class="shop-container">
    <div class="shop-stats">
        <span id="productCount">Products: 0</span>
    </div>
    
    <div class="products-grid" id="productsGrid">
        <!-- Products will be loaded here by JavaScript -->
    </div>
</section>

<!-- Shopping Cart Modal -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🛒 Shopping Cart</h2>
            <span class="close">&times;</span>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be displayed here -->
        </div>
        <div class="cart-summary">
            <div class="summary-line">
                <span>Subtotal:</span>
                <span>₹<span id="cartSubtotal">0</span></span>
            </div>
            <div class="summary-line">
                <span>Tax (GST 5%):</span>
                <span>₹<span id="cartTax">0</span></span>
            </div>
            <div class="summary-line total">
                <span>Total:</span>
                <span>₹<span id="cartTotal">0</span></span>
            </div>
            <button class="btn btn-primary" id="checkoutBtn" style="width: 100%; margin-top: 20px;">Proceed to Checkout</button>
            <button class="btn btn-secondary" id="continueShopping" style="width: 100%; margin-top: 10px;">Continue Shopping</button>
        </div>
    </div>
</div>

<!-- Product Details Modal -->
<div id="detailsModal" class="modal">
    <div class="modal-content product-details-modal">
        <span class="close">&times;</span>
        <div id="productDetails"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 CR Group of Services - Online Shop</p>
    <p>📞 <a href="tel:917860899678">7860899678</a> | 📧 <a href="mailto:rgroupofcompanies000017@gmail.com">Email Us</a></p>
</footer>

<script src="shop.js"></script>

</body>
</html>
