<svg viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76D742;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3BA419;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for logo -->
  <circle cx="500" cy="350" r="350" fill="#f8f9fa"/>
  
  <!-- Blue swoosh left -->
  <path d="M 150 350 Q 200 250 300 200" stroke="#0055CC" stroke-width="60" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Green C -->
  <path d="M 250 150 Q 150 150 150 350 Q 150 550 250 550" stroke="url(#greenGradient)" stroke-width="80" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Blue R -->
  <g>
    <!-- R vertical line -->
    <rect x="420" y="120" width="80" height="460" fill="url(#blueGradient)" rx="10"/>
    <!-- R top curve -->
    <path d="M 500 120 Q 620 120 620 260 Q 620 380 500 380" stroke="url(#blueGradient)" stroke-width="80" fill="none" stroke-linecap="round"/>
    <!-- R diagonal leg -->
    <line x1="500" y1="380" x2="650" y2="580" stroke="url(#blueGradient)" stroke-width="80" stroke-linecap="round"/>
  </g>
  
  <!-- Shopping cart inside -->
  <g transform="translate(500, 350)">
    <!-- Cart outline -->
    <path d="M -40 -20 L -30 30 Q -30 40 -20 40 L 40 40 Q 50 40 50 30 L 50 -20" stroke="#228B22" stroke-width="12" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Cart handle -->
    <path d="M -30 -20 Q 10 -50 50 -20" stroke="#228B22" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Cart items lines -->
    <line x1="-20" y1="0" x2="40" y2="0" stroke="#228B22" stroke-width="8" stroke-linecap="round"/>
    <line x1="-25" y1="15" x2="35" y2="15" stroke="#228B22" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Green leaves right -->
  <g transform="translate(720, 200)">
    <!-- Leaf 1 -->
    <ellipse cx="0" cy="0" rx="35" ry="60" fill="url(#greenGradient)" transform="rotate(45)"/>
    <path d="M 0 -60 Q 20 0 0 60" stroke="#fff" stroke-width="3" fill="none"/>
    
    <!-- Leaf 2 -->
    <ellipse cx="60" cy="80" rx="35" ry="60" fill="#76D742" transform="rotate(120)"/>
    <path d="M 60 20 Q 80 80 60 140" stroke="#fff" stroke-width="3" fill="none"/>
    
    <!-- Leaf 3 -->
    <ellipse cx="20" cy="140" rx="30" ry="50" fill="#3BA419" transform="rotate(-30)"/>
    <path d="M 20 90 Q 35 140 20 190" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Bottom curve accent -->
  <path d="M 150 500 Q 500 650 850 500" stroke="url(#greenGradient)" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Text: CR GROUP -->
  <text x="80" y="750" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#3BA419">CR</text>
  <text x="380" y="750" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#0055CC">GROUP</text>
  
  <!-- Text: OF SERVICES -->
  <text x="300" y="830" font-family="Arial, sans-serif" font-size="80" font-weight="normal" fill="#666666">OF SERVICES</text>
  
  <!-- Service icons section -->
  <g>
    <!-- Online Grocery -->
    <g transform="translate(180, 950)">
      <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#76D742"/>
      <circle cx="-15" cy="-10" r="6" fill="#fff"/>
      <circle cx="0" cy="-10" r="6" fill="#fff"/>
      <circle cx="15" cy="-10" r="6" fill="#fff"/>
      <path d="M -20 5 L 20 5 L 15 25 L -15 25 Z" fill="#fff"/>
      <circle cx="-5" cy="30" r="4" fill="#fff"/>
      <circle cx="10" cy="30" r="4" fill="#fff"/>
    </g>
    <text x="180" y="1070" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#333">ONLINE GROCERY</text>
    
    <!-- E-Commerce -->
    <g transform="translate(500, 950)">
      <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#0055CC"/>
      <path d="M -15 -10 L 0 5 L 15 -15" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M -20 15 L 20 15 L 15 30 L -15 30 Z" fill="#fff"/>
      <circle cx="-5" cy="35" r="4" fill="#fff"/>
      <circle cx="10" cy="35" r="4" fill="#fff"/>
    </g>
    <text x="500" y="1070" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#333">E-COMMERCE</text>
    
    <!-- Online Services -->
    <g transform="translate(820, 950)">
      <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#0055CC"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#fff" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#fff" stroke-width="3"/>
      <line x1="0" y1="-20" x2="0" y2="-28" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="0" y2="28" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="-20" y1="0" x2="-28" y2="0" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="0" x2="28" y2="0" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="820" y="1070" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#333">ONLINE SERVICES</text>
  </g>
  
  <!-- Dividers -->
  <line x1="340" y1="930" x2="340" y2="1000" stroke="#999" stroke-width="3"/>
  <line x1="660" y1="930" x2="660" y2="1000" stroke="#999" stroke-width="3"/>
  
  <!-- Tagline -->
  <text x="500" y="1140" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#0055CC">SMART SHOPPING</text>
  <text x="500" y="1190" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#3BA419">BETTER LIVING</text>
</svg>